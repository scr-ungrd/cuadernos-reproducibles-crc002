# =====================================================================
# Conda environment for Binder reproducibility
# Riesgos · Olas de calor urbano · Cartagena
# =====================================================================
name: riesgos-olas-calor

channels:
  - conda-forge

dependencies:
  - python=3.11

  # Core scientific stack
  - numpy>=1.26
  - pandas>=2.1
  - scipy>=1.11
  - matplotlib>=3.8
  - seaborn>=0.13

  # Geospatial / climate
  - xarray>=2024.3
  - rioxarray>=0.15
  - rasterio>=1.3
  - geopandas>=0.14
  - shapely>=2.0
  - pyproj>=3.6
  - netcdf4>=1.6.5
  - dask>=2024.4

  # Climate indices
  - xclim>=0.49

  # Interactive maps
  - folium>=0.16
  - branca>=0.7

  # Notebook tooling
  - jupyterlab>=4.0
  - notebook>=7.0
  - ipykernel>=6.27

  # Utilities
  - pyyaml>=6.0
  - tqdm>=4.66

  # pip-only (for GEE Mode B)
  - pip
  - pip:
    - earthengine-api>=0.1.395
    - xee>=0.0.15
    - geemap>=0.32
    - pylandtemp>=0.1
    # - climada>=5.0   # opcional para Fase 6 — descomentar cuando se active
